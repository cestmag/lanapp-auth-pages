<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Auth Callback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: radial-gradient(circle at 25% 0%, #dbeafe 0%, #f8fafc 40%, #e0e7ff 100%);
      --text: #0f172a;
      --surface: rgba(255, 255, 255, 0.8);
      --border: rgba(148, 163, 184, 0.4);
      --code-bg: #0f172a;
      --code-text: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 2.5rem 1rem;
      font-family: Inter, "Noto Sans JP", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: grid;
      gap: 1rem;
      place-content: start center;
    }
    h1, p, code {
      width: min(860px, 100%);
      margin: 0;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
    }
    h1, p { padding: 1rem 1.2rem; }
    code {
      display: block;
      padding: 1rem 1.2rem;
      white-space: pre-wrap;
      word-break: break-all;
      background: linear-gradient(145deg, #0b1222, var(--code-bg));
      color: var(--code-text);
      border-color: rgba(148, 163, 184, 0.25);
      font-size: 0.92rem;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <h1>Auth Callback</h1>
  <p>クエリパラメータを下に表示します（デバッグ用）。</p>
  <code id="out"></code>
  <script>
    const u = new URL(location.href);
    const obj = {};
    u.searchParams.forEach((v,k)=>{ if(!obj[k]) obj[k]=[]; obj[k].push(v); });
    document.getElementById('out').textContent = JSON.stringify({
      href: location.href,
      path: location.pathname,
      params: obj
    }, null, 2);
  </script>
</body>
</html>
