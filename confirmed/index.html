<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>確認が完了しました</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: radial-gradient(circle at 10% 0%, #dbeafe 0%, #f8fafc 45%, #e0e7ff 100%);
      --text: #0f172a;
      --surface: rgba(255, 255, 255, 0.78);
      --border: rgba(148, 163, 184, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-content: center;
      gap: 1rem;
      padding: 1.5rem;
      background: var(--bg);
      font-family: Inter, "Noto Sans JP", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
    }
    h1, p {
      margin: 0;
      width: min(760px, 100%);
      padding: 1rem 1.25rem;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
    }
    h1 { font-size: clamp(1.6rem, 2.6vw, 2.2rem); letter-spacing: -0.02em; }
  </style>
</head>
<body>
  <h1>確認が完了しました</h1>
  <p>このページは確認完了の着地ページです。</p>
</body>
</html>
