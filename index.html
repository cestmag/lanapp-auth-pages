<!doctype html>
<html lang="ja"><meta charset="utf-8">
<title>lanapp-auth-pages</title>
<style>
  :root {
    color-scheme: light;
    --bg: radial-gradient(circle at 20% 0%, #e0e7ff 0%, #f8fafc 45%, #eef2ff 100%);
    --text: #0f172a;
    --card: rgba(255, 255, 255, 0.72);
    --border: rgba(148, 163, 184, 0.35);
    --accent: #4f46e5;
    --accent-soft: #6366f1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    padding: 3rem 1.25rem;
    font-family: Inter, "Noto Sans JP", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    display: grid;
    place-items: center;
  }
  h1, ul {
    width: min(760px, 100%);
  }
  h1 {
    margin: 0 0 1rem;
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    letter-spacing: -0.02em;
  }
  ul {
    margin: 0;
    padding: 1rem;
    list-style-position: inside;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--card);
    backdrop-filter: blur(10px);
    box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
    line-height: 1.8;
  }
  a {
    color: var(--accent);
    text-decoration-thickness: 2px;
    text-underline-offset: 2px;
  }
  a:hover {
    color: var(--accent-soft);
  }
</style>
<body>
  <h1>lanapp-auth-pages!</h1>
  <ul>
    <li><a href="./confirmed/">confirmed/</a></li>
    <li><a href="./auth-callback/">auth-callback/</a></li>
    <li><a href="./.well-known/assetlinks.json">.well-known/assetlinks.json</a></li>
    <li><a href="./delete-account/">delete-account</a></li>
    <li><a href="./delete-data/">delete-data</a></li>
    <li><a href="./privacy-policy/">privacy-policy</a></li>
  </ul>
</body>
</html>
